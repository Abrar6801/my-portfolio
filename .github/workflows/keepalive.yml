# Pings Supabase every 2 days so the free-tier project never pauses
# for inactivity (paused projects do NOT wake on their own — see
# EVIDENCE_BOARD_REDESIGN.md §4.7).
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   SUPABASE_URL       e.g. https://abcdefghijklm.supabase.co
#   SUPABASE_ANON_KEY  the public anon key
#
# The workflow is a no-op (skipped) until those secrets exist.
name: Supabase keep-alive

on:
  schedule:
    - cron: '17 6 */2 * *'   # every 2 days at 06:17 UTC
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    if: ${{ vars.SUPABASE_ENABLED == 'true' }}
    steps:
      - name: Ping content table
        run: |
          curl --fail --silent --show-error \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/content?select=key&limit=1" \
            > /dev/null
          echo "Supabase is awake."
